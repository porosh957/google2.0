<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <title>Google 2.0</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      margin: 0;
      padding: 0;
      color: #202124;
    }

    /* ===== Header ===== */
    header {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 16px 24px 0 24px;
      gap: 16px;
      position: relative;
      z-index: 2;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .top-links {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 14px;
    }
    .top-links a {
      color: #5f6368;
      text-decoration: none;
    }
    .top-links a:hover { text-decoration: underline; }

    .sign-in-btn {
      display: inline-block;
      background: #1a73e8;
      color: #fff;
      font-weight: 500;
      font-size: 14px;
      padding: 8px 16px;
      border-radius: 4px;
      text-decoration: none;
      box-shadow: 0 1px 2px rgba(60,64,67,.08);
      transition: background 0.2s;
      border: none;
    }
    .sign-in-btn:hover { background: #1765c1; }

    .avatar {
      position: absolute;
      top: 5px;
      right: 5px;
      display: inline-flex;
      width: 32px; height: 32px;
      border-radius: 50%;
      overflow: hidden;
      align-items: center; justify-content: center;
      background: #eee;
      border: 1px solid #dadce0;
    }
    .avatar svg { width: 100%; height: 100%; }

    /* ===== Main content ===== */
    .main-content { max-width: 900px; margin: 0 auto; }
    .container { margin-top: 80px; text-align: center; }
    .logo { margin-bottom: 30px; }

    .search-box {
      position: relative;
      width: 500px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .search-icon-btn {
      background: none; border: none;
      position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
      padding: 0; cursor: pointer; z-index: 1;
    }
    .search-icon { width: 24px; height: 24px; fill: #5f6368; }
    .search-box input[type="text"] {
      width: 100%;
      padding: 12px 20px 12px 52px;
      font-size: 18px;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      outline: none;
      box-shadow: none;
      background: #fff;
    }
    .buttons { margin-top: 30px; }
    input[type="submit"], .feeling-lucky {
      background: #f8f9fa;
      border: 1px solid #f8f9fa;
      border-radius: 4px;
      color: #5f6368;
      font-size: 14px;
      padding: 10px 20px;
      margin: 0 5px; cursor: pointer;
    }
    input[type="submit"]:hover, .feeling-lucky:hover {
      border: 1px solid #c6c6c6; background: #f1f1f1;
    }

    footer {
      position: fixed; bottom: 0; width: 100%;
      background: #f2f2f2; padding: 15px 0; text-align: center;
      font-size: 14px; color: #5f6368;
    }
    footer a { color: #5f6368; text-decoration: none; margin: 0 10px; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 700px) {
      .search-box { width: 90vw; }
      .header-right { gap: 12px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-right">
      <nav class="top-links">
        <a href="https://mail.google.com/">Gmail</a>
        <a href="https://www.google.com/imghp">Images</a>
        <div></div>
        <div></div>
      </nav>
      <a id="avatar" href="#" class="avatar" aria-label="Google Account" hidden="">
        <svg viewBox="0 0 32 32">
          <circle cx="16" cy="12" r="7" fill="#bdbdbd"></circle>
          <ellipse cx="16" cy="26" rx="10" ry="6" fill="#bdbdbd"></ellipse>
        </svg>
      </a>
    </div>
  </header>

  <main class="main-content" id="main-content">
    <div class="container">
      <div class="logo">
        <img src="https://earnest-gumdrop-f9393c.netlify.app/ChatGPT%20Image%20May%2011,%202025,%2008_46_39%20PM.png" alt="Google 2.0 Logo" style="width:272px; height:auto;">
      </div>
      <form action="https://www.google.com/search" method="get">
        <div class="search-box">
          <button type="button" id="search-icon-btn" class="search-icon-btn" aria-label="Search">
            <svg class="search-icon" viewBox="0 0 24 24">
              <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99c.41.41 1.09.41 1.5 0s.41-1.09 0-1.5l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path>
            </svg>
          </button>
          <input type="text" name="q" placeholder="Search Google...">
        </div>
        <div class="buttons">
          <input type="submit" value="Google Search">
          <button class="feeling-lucky" type="submit" name="btnI" value="I'm Feeling Lucky">I'm Feeling Lucky</button>
        </div>
      </form>
    </div>
  </main>

  <footer>
    <a href="https://ads.google.com/">Advertising</a>
    <a href="https://www.google.com/services/">Business</a>
    <a href="https://about.google/">About</a>
    <a href="https://policies.google.com/privacy">Privacy</a>
    <a href="https://policies.google.com/terms">Terms</a>
    <a href="https://www.google.com/preferences">Settings</a>
  </footer>

  <script>
    // Search icon click submits the form
    document.getElementById('search-icon-btn').addEventListener('click', function () {
      this.closest('form').submit();
    });
  </script>
</body>
</html>
